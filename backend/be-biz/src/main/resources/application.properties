# =============================================
# 서버 설정
# =============================================
server.port=${JOBABA_BE_BIZ_PORT:8081}
server.error.include-stacktrace=never
server.error.include-message=never
jobaba.map.cors.allowed-origins=${JOBABA_MAP_CORS_ALLOWED_ORIGINS:http://localhost:8080}

# =============================================
# DataSource (로컬 MariaDB - MySQL 호환)
# =============================================
spring.datasource.url=${JOBABA_DB_URL:?JOBABA_DB_URL is required}
spring.datasource.username=${JOBABA_DB_USERNAME:?JOBABA_DB_USERNAME is required}
spring.datasource.password=${JOBABA_DB_PASSWORD:?JOBABA_DB_PASSWORD is required}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# MyBatis
# =============================================
mybatis.mapper-locations=classpath*:kr/go/tkjf/usr/map/dao/sql/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30

# =============================================
# Logging
# =============================================
logging.level.kr.go.tkjf=${JOBABA_APP_LOG_LEVEL:INFO}
logging.level.org.mybatis=${JOBABA_MYBATIS_LOG_LEVEL:INFO}
