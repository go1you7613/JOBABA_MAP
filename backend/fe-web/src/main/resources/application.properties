# =============================================
# FE Web server
# =============================================
server.port=${JOBABA_FE_WEB_PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=never

# =============================================
# JSP view
# =============================================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# fe-web calls be-biz server-to-server; browsers always use the same-origin fe-web API.
jobaba.map.biz-base-url=${JOBABA_MAP_BIZ_BASE_URL:http://localhost:8081}
jobaba.map.biz-allowed-hosts=${JOBABA_MAP_BIZ_ALLOWED_HOSTS:localhost,127.0.0.1,jobaba-map-be-biz}
jobaba.map.write.allowed-origins=${JOBABA_MAP_WRITE_ALLOWED_ORIGINS:http://localhost:8080}
