# =============================================
# FE Web server
# =============================================
server.port=${JOBABA_FE_WEB_PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=never

# =============================================
# JSP view
# =============================================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Local default points JSP/JS calls to the separated be-biz module.
# In gateway/ingress deployments, set this to an empty value or same-origin API path.
jobaba.map.api-base-url=${JOBABA_MAP_API_BASE_URL:http://localhost:8081}
